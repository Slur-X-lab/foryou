<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine's Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: pink;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .box img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .box p {
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.5;
        }
        button {
            margin: 10px 5px;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:active {
            transform: scale(0.95);
        }
        .yes {
            background: #ff4d6d;
            color: white;
        }
        .yes:hover {
            background: #ff2d4d;
        }
        .no {
            background: #ccc;
        }
        .no:hover {
            background: #bbb;
        }
        .fleeing-no {
            position: fixed;
            transition: all 0.3s ease !important;
            z-index: 10;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotateZ(360deg);
                opacity: 0;
            }
        }
        .falling {
            position: fixed;
            top: -50px;
            font-size: 30px;
            animation: fall 3s linear forwards;
            pointer-events: none;
            z-index: 1;
        }
        .celebration-gif {
            position: fixed;
            width: 120px;
            height: 120px;
            object-fit: cover;
            pointer-events: none;
            z-index: 1;
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .box {
                padding: 20px;
                border-radius: 10px;
            }
            .box img {
                height: 250px;
            }
            .box p {
                font-size: 14px;
            }
            button {
                margin: 8px 4px;
                padding: 10px 15px;
                font-size: 14px;
            }
            .celebration-gif {
                width: 80px;
                height: 80px;
            }
            .falling {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="box" id="content">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcfsKHvdEvMieNCKZF0dNG2444Cjm0AAulUg&s" alt="Valentine" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
    <p>
        Hi mycutiepatootie boi!! 💕<br><br>
        Sorry for giving you this late.
        I just wanna say something special to you 😗
    </p>
    <button class="yes" onclick="nextPage()">Next</button>
</div>

<script>
    let noCount = 0;
    let cryingInterval = null;

    function createFallingElements() {
        const elements = ['🌹', '🌺', '🌸', '💕', '💖', '💗', '🎀', '✨'];
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const falling = document.createElement('div');
                falling.className = 'falling';
                falling.textContent = elements[Math.floor(Math.random() * elements.length)];
                falling.style.left = Math.random() * 100 + '%';
                falling.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(falling);
                
                setTimeout(() => falling.remove(), 3500);
            }, i * 100);
        }
    }

    function createCryingEmojis() {
        const cryElements = ['😭', '😢', '💔'];
        cryingInterval = setInterval(() => {
            const falling = document.createElement('div');
            falling.className = 'falling';
            falling.textContent = cryElements[Math.floor(Math.random() * cryElements.length)];
            falling.style.left = Math.random() * 100 + '%';
            falling.style.animationDelay = '0s';
            document.body.appendChild(falling);
            
            setTimeout(() => falling.remove(), 3500);
        }, 150);
        
        // Stop creating crying emojis after 10 seconds
        setTimeout(() => clearInterval(cryingInterval), 10000);
    }

    function createCelebrationGifs() {
        const gifs = [
            'https://media.tenor.com/DpJdyKQKgYkAAAAm/cat-jump.webp',
            'https://media.tenor.com/zN5C2mTeYWoAAAAM/dnce.gif',
            'https://media.tenor.com/WlJsOVX2lysAAAAm/cat-tongue-cat.webp'
        ];
        
        for (let i = 0; i < 8; i++) {
            setTimeout(() => {
                const gif = document.createElement('img');
                gif.className = 'celebration-gif';
                gif.src = gifs[Math.floor(Math.random() * gifs.length)];
                gif.style.left = Math.random() * 90 + '%';
                gif.style.top = Math.random() * 80 + '%';
                gif.style.animation = `fall ${3 + Math.random() * 2}s linear forwards`;
                document.body.appendChild(gif);
                
                setTimeout(() => gif.remove(), 5500);
            }, i * 300);
        }
    }

    function moveButtonAway(button) {
        const randomX = Math.random() * (window.innerWidth - 100);
        const randomY = Math.random() * (window.innerHeight - 100);
        button.style.left = randomX + 'px';
        button.style.top = randomY + 'px';
    }

    function nextPage() {
        document.getElementById("content").innerHTML = `
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQRXDgqPOyLs9SGoyvCPJVwVBA6GOe9n8lauQ&s" alt="Valentine" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
            <p>Will you be my mine? 💘</p>
            <button class="yes" onclick="yesAnswer()">Yes</button>
            <button class="no" onclick="noAnswer()">No</button>
        `;
    }

    function noAnswer() {
        noCount++;

        if (noCount === 1) {
            document.getElementById("content").innerHTML = `
                <img src="https://media1.tenor.com/m/7R-Aqnts07EAAAAd/sad-cat.gif" alt="Sad" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
                <p>You really don't wanna be my mine? 🥺</p>
                <button class="yes" onclick="yesAnswer()">Yes</button>
                <button class="no" onclick="noAnswer()">No</button>
            `;
        } else if (noCount === 2) {
            document.getElementById("content").innerHTML = `
                <img src="https://media.tenor.com/-2rbVbnfW24AAAAm/crying-cat-sad-kitty.webp" alt="Crying" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
                <p>Azaaa namannnn 😭<br>Please be mineee 😭😭</p>
                <button class="yes" onclick="yesAnswer()">Yes</button>
                <button class="no" onclick="noAnswer()">No</button>
            `;
        } else {
            document.getElementById("content").innerHTML = `
                <img src="https://media.tenor.com/c6nXyQmertAAAAAm/the-voices.webp" alt="Desperate" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
                <p>Sige naaaaa 😭😭😭</p>
                <button class="yes" onclick="yesAnswer()">Yes</button>
                <button class="no fleeing-no" onclick="moveButtonAway(this)">No</button>
            `;
            createCryingEmojis();
            setTimeout(() => {
                const noButton = document.querySelector(".fleeing-no");
                if (noButton) {
                    const rect = noButton.getBoundingClientRect();
                    noButton.style.left = rect.left + 'px';
                    noButton.style.top = rect.top + 'px';
                }
            }, 0);
        }
    }

    function yesAnswer() {
        clearInterval(cryingInterval);
        document.querySelectorAll('.falling').forEach(el => el.remove());
        document.getElementById("content").innerHTML = `
            <img src="https://media.tenor.com/Cse00b9Ls-4AAAAM/goobers.gif" alt="Celebration" style="width: 100%; border-radius: 10px; margin-bottom: 15px;">
            <p>
                Yeyyy!! 💖🎉<br><br>
                Pano bayan eh tayoo na? 💕<br>
                WAHAHAHA akin kana 😘
            </p>
        `;
        createFallingElements();
        createCelebrationGifs();
    }
</script>

</body>
</html>
